<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tiago Fitas · OPERA Cloud Solutions Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0b0f14;
  --text: #e6eaf0;
  --muted: #8b93a3;
  --gold: #c9a84c;
}

body {
  margin:0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at 70% 30%, rgba(201,168,76,.08), transparent 40%), #0b0f14;
  color: var(--text);
}

/* layout */
.container {
  max-width:1200px;
  margin:auto;
  padding:40px;
}

/* hero */
.hero {
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  min-height:100vh;
}

h1 {
  font-family:"Playfair Display";
  font-size:64px;
  margin:0;
}

h1 span {
  color:var(--gold);
}

p {
  color:var(--muted);
  max-width:400px;
}

.btn {
  display:inline-block;
  padding:12px 24px;
  margin-right:10px;
  border:1px solid var(--gold);
  color:var(--gold);
  text-decoration:none;
}

.btn:hover {
  background:var(--gold);
  color:#000;
}

/* globe */
#globe {
  width:100%;
  height:500px;
}
</style>
</head>

<body>

<div class="container">
  <div class="hero">

    <div>
      <h1>
        Senior OPERA Cloud<br>
        <span>Solutions Engineer</span>
      </h1>

      <p>
        20+ years in hospitality technology. OPERA Cloud, integrations, fiscal compliance, SaaS delivery across EMEA.
      </p>

      <a href="#" class="btn">Experience</a>
      <a href="#" class="btn">Download CV</a>
    </div>

    <canvas id="globe"></canvas>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const canvas = document.getElementById('globe');

const renderer = new THREE.WebGLRenderer({canvas, alpha:true});
renderer.setSize(canvas.clientWidth, canvas.clientHeight);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
camera.position.z = 4;

const sphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.5, 64, 64),
  new THREE.MeshBasicMaterial({color:0xc9a84c, wireframe:true})
);

scene.add(sphere);

function animate() {
  requestAnimationFrame(animate);
  sphere.rotation.y += 0.003;
  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
